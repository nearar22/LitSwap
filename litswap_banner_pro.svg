<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#2e1065" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)" />
  
  <!-- Decorative Grid -->
  <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.05">
    <path d="M0,100 L1500,100 M0,200 L1500,200 M0,300 L1500,300 M0,400 L1500,400" />
    <path d="M300,0 L300,500 M600,0 L600,500 M900,0 L900,500 M1200,0 L1200,500" />
  </g>

  <!-- Logo Graphic in Banner -->
  <g transform="translate(100, 140)">
    <circle cx="80" cy="80" r="60" fill="none" stroke="url(#textGrad)" stroke-width="14" />
    <path d="M88,30 L56,85 L80,85 L72,130 L104,75 L80,75 Z" fill="#e2e8f0" />
  </g>

  <!-- Main Text -->
  <text x="300" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="900" fill="#ffffff" letter-spacing="-2">LitSwap</text>
  
  <!-- Subtitle -->
  <text x="305" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="500" fill="#94a3b8">The First Native DEX on LitVM</text>
  
  <!-- Features -->
  <text x="305" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#22d3ee">Swap • Earn • Provide Liquidity</text>

  <!-- Abstract Swap UI Card on Right -->
  <g transform="translate(1000, 70)">
    <rect width="380" height="360" rx="24" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" />
    <text x="40" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Swap</text>
    
    <!-- Token In Box -->
    <rect x="40" y="90" width="300" height="80" rx="16" fill="#000000" fill-opacity="0.3" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <text x="60" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">You pay</text>
    <text x="60" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff">1.50</text>
    <rect x="235" y="115" width="85" height="30" rx="15" fill="#a855f7" />
    <text x="248" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff">zkLTC</text>

    <!-- Arrow down -->
    <circle cx="190" cy="180" r="16" fill="#1e1b4b" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" />
    <path d="M190,172 L190,188 M184,182 L190,188 L196,182" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" fill="none" />

    <!-- Token Out Box -->
    <rect x="40" y="190" width="300" height="80" rx="16" fill="#000000" fill-opacity="0.3" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <text x="60" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">You receive</text>
    <text x="60" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff">3,402</text>
    <rect x="230" y="215" width="90" height="30" rx="15" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.2" />
    <text x="245" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff">USDT</text>

    <!-- Swap Button -->
    <rect x="40" y="290" width="300" height="45" rx="22.5" fill="url(#textGrad)" />
    <text x="190" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Connect Wallet</text>
  </g>
</svg>
