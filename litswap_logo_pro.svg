<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#2e1065" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="100" fill="url(#logoBg)" />
  
  <!-- Outer Circle (Swap) -->
  <circle cx="250" cy="250" r="140" fill="none" stroke="url(#logoGrad)" stroke-width="36" />
  
  <!-- Perfectly Centered, Scaled, and Softer Lightning Bolt -->
  <path d="M270,150 L190,260 L250,260 L230,350 L310,240 L250,240 Z" fill="#e2e8f0" />
</svg>
