<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep midnight matching dapp --> 
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1ad8a8" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#0d1426" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="100%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#4dc4ff" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#0d1426" stop-opacity="0"/>
    </radialGradient>
    <!-- Brand gradient (mint to cyan) matching dapp brand-gradient -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eeac9"/>
      <stop offset="100%" stop-color="#56b8ff"/>
    </linearGradient>
    <linearGradient id="brandSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle grid -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 L0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0d1426"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <rect width="1024" height="1024" fill="url(#bgGlow2)"/>

  <!-- Centered logo tile (matches the dapp header mark) -->
  <g transform="translate(232 232)">
    <!-- Outer halo -->
    <rect x="-60" y="-60" width="680" height="680" rx="200" fill="url(#brand)" opacity="0.18" filter="blur(40px)"/>
    <!-- Tile -->
    <rect x="0" y="0" width="560" height="560" rx="140" fill="url(#brand)"/>
    <!-- Inner top sheen -->
    <rect x="0" y="0" width="560" height="280" rx="140" fill="url(#brandSheen)"/>
    <!-- Diamond mark -->
    <g transform="translate(280 290)">
      <path d="M -130 30 L 0 -160 L 130 30 L 0 130 Z" fill="#0a1a2a"/>
    </g>
  </g>

  <!-- Wordmark at bottom -->
  <g transform="translate(512 920)" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700">
    <text font-size="64" fill="#ffffff" letter-spacing="-1">LitSwap</text>
  </g>
</svg>
