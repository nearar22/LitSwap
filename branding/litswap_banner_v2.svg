<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bgDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1224"/>
      <stop offset="100%" stop-color="#070c1a"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="18%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#5eeac9" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#070c1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="82%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#56b8ff" stop-opacity="0.40"/>
      <stop offset="70%" stop-color="#070c1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eeac9"/>
      <stop offset="100%" stop-color="#56b8ff"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="btnBrand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eeac9"/>
      <stop offset="100%" stop-color="#56b8ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgDeep)"/>
  <rect width="1500" height="500" fill="url(#aurora1)"/>
  <rect width="1500" height="500" fill="url(#aurora2)"/>
  <rect width="1500" height="500" fill="url(#vignette)"/>

  <!-- LEFT: Logo + wordmark + tagline -->
  <g transform="translate(110 165)">
    <!-- Logo circle (matches dapp header tile, but rounded full) -->
    <g>
      <!-- halo -->
      <circle cx="60" cy="60" r="80" fill="url(#brand)" opacity="0.25" filter="blur(18px)"/>
      <!-- tile -->
      <circle cx="60" cy="60" r="60" fill="url(#brand)"/>
      <!-- top sheen -->
      <path d="M 12 60 A 48 48 0 0 1 108 60" fill="url(#sheen)"/>
      <!-- diamond mark -->
      <path d="M 35 66 L 60 30 L 85 66 L 60 92 Z" fill="#0a1a2a"/>
    </g>

    <!-- Wordmark -->
    <g transform="translate(160 0)">
      <text font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="800"
            font-size="106" letter-spacing="-3" fill="#ffffff" y="80">LitSwap</text>

      <text font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="500"
            font-size="30" letter-spacing="0" fill="#9aa7c0" y="125">
        The First Native DEX on LitVM
      </text>

      <text font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700"
            font-size="28" letter-spacing="1" fill="#5eeac9" y="180">
        Swap <tspan fill="#56b8ff">•</tspan> Earn <tspan fill="#56b8ff">•</tspan> Provide Liquidity
      </text>
    </g>
  </g>

  <!-- RIGHT: Swap card mockup -->
  <g transform="translate(1060 95)">
    <!-- card halo -->
    <rect x="-12" y="-12" width="360" height="334" rx="32" fill="url(#brand)" opacity="0.18" filter="blur(28px)"/>
    <!-- card -->
    <rect x="0" y="0" width="336" height="310" rx="22"
          fill="#0f1a2f" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- Title -->
    <text x="22" y="40" font-family="'Space Grotesk', sans-serif"
          font-weight="700" font-size="22" fill="#ffffff">Swap</text>

    <!-- You pay row -->
    <rect x="18" y="60" width="300" height="76" rx="14" fill="#16223a"/>
    <text x="32" y="84" font-family="'Space Grotesk', sans-serif"
          font-size="13" fill="#7a8aa6">You pay</text>
    <text x="32" y="120" font-family="'JetBrains Mono', monospace"
          font-weight="700" font-size="26" fill="#ffffff">1.50</text>
    <!-- token pill -->
    <rect x="232" y="82" width="74" height="32" rx="16" fill="#5eeac9" fill-opacity="0.15"/>
    <text x="269" y="104" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif" font-weight="700"
          font-size="13" fill="#5eeac9">zkLTC</text>

    <!-- swap arrow -->
    <g transform="translate(155 142)">
      <circle cx="13" cy="13" r="13" fill="#0f1a2f" stroke="#5eeac9" stroke-opacity="0.4"/>
      <path d="M13 6 V20 M8 15 L13 20 L18 15" stroke="#5eeac9"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- You receive row -->
    <rect x="18" y="174" width="300" height="76" rx="14" fill="#16223a"/>
    <text x="32" y="198" font-family="'Space Grotesk', sans-serif"
          font-size="13" fill="#7a8aa6">You receive</text>
    <text x="32" y="234" font-family="'JetBrains Mono', monospace"
          font-weight="700" font-size="26" fill="#ffffff">3,402</text>
    <!-- token pill -->
    <rect x="232" y="196" width="74" height="32" rx="16" fill="#56b8ff" fill-opacity="0.15"/>
    <text x="269" y="218" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif" font-weight="700"
          font-size="13" fill="#56b8ff">USDT</text>

    <!-- Connect wallet button -->
    <rect x="18" y="266" width="300" height="32" rx="16" fill="url(#btnBrand)"/>
    <text x="168" y="288" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif" font-weight="700"
          font-size="14" fill="#0a1a2a">Connect Wallet</text>
  </g>
</svg>
