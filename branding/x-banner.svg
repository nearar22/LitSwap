<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="aurora1" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5eeac9" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#0d1426" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="85%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#56b8ff" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#0d1426" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="60%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#0d1426" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eeac9"/>
      <stop offset="100%" stop-color="#56b8ff"/>
    </linearGradient>
    <linearGradient id="brandText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eeac9"/>
      <stop offset="100%" stop-color="#56b8ff"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#0d1426"/>
  <rect width="1500" height="500" fill="url(#grid)"/>
  <rect width="1500" height="500" fill="url(#aurora1)"/>
  <rect width="1500" height="500" fill="url(#aurora2)"/>
  <rect width="1500" height="500" fill="url(#aurora3)"/>

  <!-- Logo + wordmark group, left-aligned and offset so it sits above the X avatar overlap -->
  <g transform="translate(120 175)">
    <!-- Halo behind tile -->
    <rect x="-30" y="-30" width="210" height="210" rx="60" fill="url(#brand)" opacity="0.25" filter="blur(24px)"/>
    <!-- Tile -->
    <rect x="0" y="0" width="150" height="150" rx="40" fill="url(#brand)"/>
    <rect x="0" y="0" width="150" height="75" rx="40" fill="url(#sheen)"/>
    <!-- Diamond mark -->
    <g transform="translate(75 80)">
      <path d="M -35 8 L 0 -42 L 35 8 L 0 35 Z" fill="#0a1a2a"/>
    </g>

    <!-- Wordmark -->
    <g transform="translate(190 30)">
      <text font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700"
            font-size="92" letter-spacing="-2" fill="#ffffff">LitSwap</text>
      <text y="60" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="500"
            font-size="28" letter-spacing="2" fill="#9aa7c0">
        The first DEX on LitVM — Litecoin's EVM rollup
      </text>
      <!-- Pill -->
      <g transform="translate(0 96)">
        <rect x="0" y="0" width="290" height="38" rx="19" fill="#ffffff" fill-opacity="0.06" stroke="#5eeac9" stroke-opacity="0.35"/>
        <circle cx="22" cy="19" r="5" fill="#5eeac9"/>
        <text x="40" y="25" font-family="'JetBrains Mono', monospace" font-size="14"
              letter-spacing="3" fill="#5eeac9">LIVE · LITVM TESTNET</text>
      </g>
    </g>
  </g>

  <!-- Decorative swap arrows on the right -->
  <g transform="translate(1180 230)" stroke="url(#brand)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
    <path d="M0 0 H180 L150 -28"/>
    <path d="M220 60 H40 L70 88"/>
  </g>
  <!-- Subtle tick marks -->
  <g transform="translate(1100 380)" fill="#5eeac9" opacity="0.5">
    <circle cx="0" cy="0" r="3"/>
    <circle cx="22" cy="0" r="3"/>
    <circle cx="44" cy="0" r="3"/>
    <circle cx="66" cy="0" r="3"/>
  </g>
</svg>
